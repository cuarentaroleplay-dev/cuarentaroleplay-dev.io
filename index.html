<!DOCTYPE html>
<html lang="es">
<head>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comprobante Editables BDV Larry</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            background-color: #f5f5f5;
        }

        /* Contenedor relativo */
        .contenedor-principal {
            position: relative;
            width: 800px; 
            height: auto;
        }

        .imagen-fondo {
            width: 100%;
            display: block;
            border-radius: 8px;
        }

        /* --- NUEVO: Estilo para el Monto Central --- */
        .contenedor-monto {
            position: absolute;
            top: 200px; /* Ajustado para el recuadro gris */
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            text-align: center;
        }

        .input-monto {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            text-align: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-size: 19px;
            font-weight: 700;
            color: #444;
        }

        /* Capa para el formulario de abajo */
        .capa-formulario {
            position: absolute;
            top: 230px; /* Ajustado para seguir después del monto */
            left: 120px; 
            width: 210px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        td {
            height: 27.5px; /* Ajuste fino para alinear con las etiquetas de la imagen */
            vertical-align: middle;
            padding: 0;
        }

        .columna-espacio {
            width: 80px; 
        }

        .input-datos {
            width: 100%;
            background: transparent;
            border: none;
            font-size: 14px;
            color: #444;
            outline: none;
            font-family: sans-serif;
        }

        .input-datos::placeholder {
            color: #bbb;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="contenedor-principal">
        <img src="https://uploads.onecompiler.io/44j7h8uqg/44j837649/1000321124.jpg" alt="Comprobante" class="imagen-fondo">

        <div class="contenedor-monto">
            <input type="text" class="input-monto" placeholder="730,00 Bs">
        </div>

        <form class="capa-formulario">
            <table>
                <tr>
                    <td><input type="text" class="input-datos" placeholder="18/07/2024"></td>
                </tr>
                <tr>
                    <td><input type="text" class="input-datos" placeholder="001166797627"></td>
                </tr>
                <tr>
                    <td><input type="text" class="input-datos" placeholder="23581179"></td>
                </tr>
                <tr>
                    <td><input type="text" class="input-datos" placeholder="0102****8354"></td>
                </tr>
                <tr>
                    <td><input type="text" class="input-datos" placeholder="04248635826"></td>
                </tr>
                <tr>
                    <td><input type="text" class="input-datos" placeholder="0102 - Banco de Venezuela"></td>
                </tr>
                <tr>
                    <td><input type="text" class="input-datos" placeholder="pago"></td>
                </tr>
            </table>
        </form>
    </div>

</body>
<button onclick="enviarAlBot()" style="width:100%; padding:10px; background:red; color:white; border:none;">Listo</button>
